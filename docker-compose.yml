services:
  pholio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pholio
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    user: "${PUID:?Set PUID}:${PGID:?Set PGID}"
    environment:
      PORT: "8080"
      PHOTO_ROOT: "/photos"
      DATA_DIR: "/data"
      DATABASE_URL: "jdbc:sqlite:/data/pholio.sqlite3"
      THUMB_DIR: "/data/thumbs"
      APP_DEFAULT_TIMEZONE: "${APP_DEFAULT_TIMEZONE:-Asia/Tokyo}"
      SCAN_ON_STARTUP: "${SCAN_ON_STARTUP:-true}"
      THUMBNAIL_WORKERS: "${THUMBNAIL_WORKERS:-2}"
      THUMBNAIL_PREVIEW_LAZY: "${THUMBNAIL_PREVIEW_LAZY:-true}"
      TRUST_PROXY_HEADERS: "${TRUST_PROXY_HEADERS:-false}"
      CLOUDFLARE_ACCESS_ENABLED: "${CLOUDFLARE_ACCESS_ENABLED:-false}"
    volumes:
      - "${PHOTOS_PATH:?Set PHOTOS_PATH}:/photos:ro"
      - "${DATA_PATH:?Set DATA_PATH}:/data"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
